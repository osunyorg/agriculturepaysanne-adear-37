[[cors]]
allowed_origins = "*"
allowed_methods = ["GET", "POST"]
allowed_headers = "*"

[[headers]]
for = ["**/*.woff2", "**/*.woff", "**/*.svg", "**/*.ttf", "**/*.otf", "**/*.eot", "**/*.js", "**/*.css"]
compress = "gzip"
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[headers]]
for = ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.gif", "**/*.webp"]
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[redirects]]
from = "/offres-d-emploi/index.html"
to = "/annonces/"

[[redirects]]
from = "/espace-presse/index.html"
to = "/qui-sommes-nous/espace-presse/"

[[redirects]]
from = "/service-comptabilite-mutualise/index.html"
to = "/nos-activites/service-comptabilite-mutualise/"

[[redirects]]
from = "/activites/formation/index.html"
to = "/formation/"

